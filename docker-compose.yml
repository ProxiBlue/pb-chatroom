services:
  server:
    build: ./server
    ports:
      # The REST server is reached by the chat_threads_open slash command
      # (root-thread creation) from any Claude Code session — host or DDEV
      # container. Container sessions need host.docker.internal:7476, which
      # resolves to the docker-bridge gateway IP and would be refused by a
      # 127.0.0.1-only binding. Bind all interfaces; same trade-off as the
      # mcp service (v0.1.3) — isolation relies on the workstation's
      # firewall. The HTML dashboard is also reached at this port; on a
      # multi-user LAN, add a ufw rule (see README "Container reachability").
      - "7476:7476"
    volumes:
      - ./data:/data
    environment:
      PB_CHATROOM_DB_PATH: /data/chatroom.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7476/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3

  mcp:
    build: ./mcp
    ports:
      # MCP must be reachable from DDEV containers via host.docker.internal,
      # which resolves to the host's docker-bridge gateway IP — NOT loopback.
      # Binding 127.0.0.1 here would refuse all cross-container traffic.
      # Bind all interfaces; isolation relies on the workstation's own
      # firewall (single-user dev box, behind NAT).
      - "7477:7477"
    environment:
      PB_CHATROOM_SERVER_URL: http://server:7476
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  relay:
    build: ./relay
    profiles: ["relay"]
    ports: []
    volumes:
      - ./relay/responders.json:/app/relay/responders.json:ro
      - ./relay/state:/app/relay/state
    environment:
      PB_CHATROOM_SERVER_URL: http://server:7476
      PB_CHATROOM_RELAY_CONFIG: /app/relay/responders.json
      PB_CHATROOM_RELAY_STATE_DIR: /app/relay/state
    depends_on:
      server:
        condition: service_healthy
      mcp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
