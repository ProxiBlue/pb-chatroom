<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pb-chatroom</title>
    <style>
        body { font-family: monospace; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        h1 { border-bottom: 1px solid #ccc; padding-bottom: 0.5rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { text-align: left; padding: 0.4rem 0.6rem; border: 1px solid #ddd; }
        th { background: #f4f4f4; }
        a { color: #0066cc; }
        .messages { list-style: none; padding: 0; }
        .messages li { border: 1px solid #ddd; margin: 0.4rem 0; padding: 0.5rem; }
        .msg-meta { font-size: 0.85em; color: #666; }
        .empty { color: #888; font-style: italic; }
    </style>
</head>
<body>
    <h1><a href="/">pb-chatroom</a></h1>
    {% block content %}{% endblock %}
</body>
</html>
